<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "background": "#000000",
          "surface": "#121212",
          "on-surface": "#ffffff",
          "primary": "#ffffff",
          "secondary": "#a8a8a8",
          "button-bg": "#363636",
          "button-hover": "#262626"
        },
        fontFamily: {
          "headline": ["Inter", "sans-serif"],
          "body": ["Inter", "sans-serif"],
          "label": ["Inter", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "8px", "lg": "12px", "xl": "16px", "full": "9999px"},
      },
    },
  }
</script>
<style>
.material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}
body {
    background-color: #000000;
    color: #ffffff;
    -webkit-font-smoothing: antialiased;
}
.gallery-grid {
    display: grid;
    gap: 4px;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    justify-items: center;
}
.aspect-square {
    aspect-ratio: 1 / 1;
    width: 100%;
}
::-webkit-scrollbar {
    width: 8px;
}
::-webkit-scrollbar-track {
    background: #000000;
}
::-webkit-scrollbar-thumb {
    background: #363636;
    border-radius: 10px;
}
</style>
</head>
<body class="font-body selection:bg-white selection:text-black">
<div class="max-w-4xl mx-auto px-4 pt-12">
  <header class="mb-6">
    <h1 class="text-2xl font-semibold">Gallery</h1>
  </header>

  <main class="w-full pb-12">
    <div class="gallery-grid">
      <div class="group relative overflow-hidden bg-neutral-900 cursor-pointer aspect-square">
        <img class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-80" src="0.jpg"/>
      </div>
      <div class="group relative overflow-hidden bg-neutral-900 cursor-pointer aspect-square">
        <img class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-80" src="1.jpg"/>
      </div>
      <div class="group relative overflow-hidden bg-neutral-900 cursor-pointer aspect-square">
        <img class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-80" src="1a.jpg"/>
      </div>
      <div class="group relative overflow-hidden bg-neutral-900 cursor-pointer aspect-square">
        <img class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-80" src="2.jpg"/>
      </div>
      <div class="group relative overflow-hidden bg-neutral-900 cursor-pointer aspect-square">
        <img class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-80" src="3.jpg"/>
      </div>
      <div class="group relative overflow-hidden bg-neutral-900 cursor-pointer aspect-square">
        <img class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-80" src="4.jpg"/>
      </div>
      <div class="group relative overflow-hidden bg-neutral-900 cursor-pointer aspect-square">
        <img class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-80" src="5.jpg"/>
      </div>
      <div class="group relative overflow-hidden bg-neutral-900 cursor-pointer aspect-square">
        <img class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-80" src="6.jpg"/>
      </div>
      <div class="group relative overflow-hidden bg-neutral-900 cursor-pointer aspect-square">
        <img class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-80" src="7.jpg"/>
      </div>
      <div class="group relative overflow-hidden bg-neutral-900 cursor-pointer aspect-square">
        <img class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-80" src="9.jpg"/>
      </div>
      <div class="group relative overflow-hidden bg-neutral-900 cursor-pointer aspect-square">
        <img class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-80" src="11.jpg"/>
      </div>
      <div class="group relative overflow-hidden bg-neutral-900 cursor-pointer aspect-square">
        <img class="w-full h-full object-cover transition-opacity duration-300 group-hover:opacity-80" src="12.jpg"/>
      </div>
    </div>
  </main>
</div>

<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/95 opacity-0 pointer-events-none transition-opacity duration-300" id="lightbox">
  <button class="absolute top-8 right-8 text-white hover:opacity-50 transition-opacity z-50">
    <span class="material-symbols-outlined text-4xl">close</span>
  </button>
  <div class="relative w-full h-full p-4 md:p-12 flex items-center justify-center">
    <img class="max-w-full max-h-[80vh] object-contain" id="lightbox-img" src=""/>
  </div>
</div>

<script>
  const gridItems = document.querySelectorAll('.gallery-grid > div');
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');
  const closeBtn = lightbox.querySelector('button');

  gridItems.forEach(item => {
    item.addEventListener('click', () => {
      const imgSrc = item.querySelector('img').src;
      lightboxImg.src = imgSrc;
      lightbox.classList.remove('opacity-0', 'pointer-events-none');
      lightbox.classList.add('opacity-100', 'pointer-events-auto');
      document.body.style.overflow = 'hidden';
    });
  });

  closeBtn.addEventListener('click', () => {
    lightbox.classList.add('opacity-0', 'pointer-events-none');
    lightbox.classList.remove('opacity-100', 'pointer-events-auto');
    document.body.style.overflow = '';
  });

  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) closeBtn.click();
  });
</script>
</body>
</html>
